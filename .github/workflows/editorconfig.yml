name: Build llama-cli CentOS 7
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build in CentOS 7 container
        run: |
          docker run --rm -v ${{ github.workspace }}:/src centos:7 bash -c "
            sed -i 's/mirror.centos.org/vault.centos.org/g' /etc/yum.repos.d/CentOS-Base.repo &&
            sed -i 's/^mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-Base.repo &&
            sed -i 's/^#baseurl/baseurl/g' /etc/yum.repos.d/CentOS-Base.repo &&
            yum install -y --disablerepo='centos-sclo-*' centos-release-scl &&
            sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/CentOS-SCLo-scl.repo &&
            find /etc/yum.repos.d/ -name 'CentOS-SCLo*' | xargs sed -i 's/mirror.centos.org/vault.centos.org/g' &&
            find /etc/yum.repos.d/ -name 'CentOS-SCLo*' | xargs sed -i 's/^mirrorlist/#mirrorlist/g' &&
            find /etc/yum.repos.d/ -name 'CentOS-SCLo*' | xargs sed -i 's/^#baseurl/baseurl/g' &&
            yum install -y epel-release &&
            yum install -y --nogpgcheck devtoolset-11-gcc devtoolset-11-gcc-c++ devtoolset-11-make cmake3 &&
            source /opt/rh/devtoolset-11/enable &&
            printf '#!/bin/bash\nexec /opt/rh/devtoolset-11/root/usr/bin/gcc \"\$@\" -march=ivybridge -mno-avx2 -mno-fma -mno-avx512f\n' > /usr/local/bin/safe-gcc &&
            printf '#!/bin/bash\nexec /opt/rh/devtoolset-11/root/usr/bin/g++ \"\$@\" -march=ivybridge -mno-avx2 -mno-fma -mno-avx512f\n' > /usr/local/bin/safe-g++ &&
            chmod +x /usr/local/bin/safe-gcc /usr/local/bin/safe-g++ &&
            echo '--- wrapper content ---' &&
            cat /usr/local/bin/safe-g++ &&
            echo 'void f(){float a[8]={};float b[8]={};for(int i=0;i<8;i++)a[i]+=b[i];}' > /tmp/t.cpp &&
            /usr/local/bin/safe-g++ -mavx2 -O3 -c /tmp/t.cpp -o /tmp/t.o &&
            echo 'AVX2 ymm count in wrapper test:' && objdump -d /tmp/t.o | grep -c ymm || echo 0 &&
            find /src/ggml /src/src -name '*.h' 2>/dev/null | xargs grep -l 'GGML_ATTRIBUTE_TARGET' | xargs sed -i 's/#define GGML_ATTRIBUTE_TARGET(s).*$/#define GGML_ATTRIBUTE_TARGET(s)/' &&
            cd /src &&
            cmake3 -B build -DLLAMA_BUILD_TESTS=OFF -DGGML_NATIVE=OFF -DGGML_AVX=ON -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_AVX512=OFF -DBUILD_SHARED_LIBS=OFF -DCMAKE_C_COMPILER=/usr/local/bin/safe-gcc -DCMAKE_CXX_COMPILER=/usr/local/bin/safe-g++ &&
            cmake3 --build build --target llama-cli -j\$(nproc)
          "
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cli-centos7
          path: build/bin/llama-cli
