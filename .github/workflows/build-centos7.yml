name: Build llama-cli CentOS 7
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build in CentOS 7 container
        run: |
          docker run --rm -v ${{ github.workspace }}:/src centos:7 bash -c "
            sed -i 's/mirror.centos.org/vault.centos.org/g' /etc/yum.repos.d/CentOS-Base.repo &&
            sed -i 's/^mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-Base.repo &&
            sed -i 's/^#baseurl/baseurl/g' /etc/yum.repos.d/CentOS-Base.repo &&
            yum install -y --disablerepo='centos-sclo-*' centos-release-scl &&
            find /etc/yum.repos.d/ -name 'CentOS-SCLo*' | xargs sed -i 's/mirror.centos.org/vault.centos.org/g' &&
            find /etc/yum.repos.d/ -name 'CentOS-SCLo*' | xargs sed -i 's/^mirrorlist/#mirrorlist/g' &&
            find /etc/yum.repos.d/ -name 'CentOS-SCLo*' | xargs sed -i 's/^#baseurl/baseurl/g' &&
            yum install -y epel-release &&
            yum install -y --nogpgcheck --disablerepo=centos-sclo-sclo devtoolset-11-gcc devtoolset-11-gcc-c++ devtoolset-11-make cmake3 &&
            source /opt/rh/devtoolset-11/enable &&
            cd /src &&
            cmake3 -B build -DLLAMA_BUILD_TESTS=OFF -DGGML_AVX=ON -DBUILD_SHARED_LIBS=OFF &&
            cmake3 --build build --target llama-cli -j\$(nproc)
          "
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cli-centos7
          path: build/bin/llama-cli
